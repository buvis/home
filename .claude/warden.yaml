# Warden config — complements native Claude permissions
# alwaysAllow bypasses all rule evaluation, so only list commands
# that are ALWAYS safe regardless of arguments.

defaultDecision: ask
auditAllowDecisions: true
askOnSubshell: true
notifyOnAsk: true
notifyOnDeny: true

alwaysDeny:
  - nc
  - ncat

alwaysAllow:
  # Dev hygiene tooling
  - pre-commit
  - yamllint
  - actionlint
  - yadm
  # GitHub CLI
  - gh
  # Rust toolchain
  - cargo
  # Node/Python toolchains
  - node
  - python
  - python3
  - pip
  - npm
  - pnpm
  - npx
  - yarn
  - uv
  - ruff
  - mypy
  - pytest
  - bats
  # Dev tools
  - showboat
  - zdb
  - ast-grep
  - mdbook
  - codex
  - copilot
  - gemini
  - pi
  - claude
  - mise
  # Autopilot wrapper (bash function in development.plugin.bash)
  - autoclaude
  - curl
  - mempalace
  - htpasswd
  # Safe shell utilities (read-only or harmless)
  - ls
  - pwd
  - cat
  - head
  - tail
  - echo
  - rg
  - grep
  - wc
  - sort
  - diff
  - tree
  - which
  - xxd
  - test
  - timeout
  - lsof
  - dig
  - ffmpeg
  - ffprobe
  - mkdocs
  - rmdir
  - shellcheck
  - rustc
  - gpgconf
  - ddb
  # File ops (safe enough, native perms gate destructive patterns)
  - cp
  - mv
  - mkdir
  - touch
  - sed
  - awk
  # Skill scripts — glob matches all scripts under ~/.claude/skills/
  - ~/.claude/skills/**
  # Trusted plugin skill/hook scripts (own marketplace only)
  - ~/.claude/plugins/cache/buvis-plugins/**
  # Hook scripts
  - ~/.claude/hooks/**
  # Temp dir scripts (macOS $TMPDIR lives under /var/folders)
  - /tmp/**
  - /private/tmp/**
  - /var/folders/**
  - /private/var/folders/**
  # Project test scripts
  - smoke.sh
  # Shell no-op builtin (guards, `while :` loops); native perms still prompt for it
  - ":"

rules:
  # Autopilot entry chain: sourcing the dev plugin is how autoclaude loads
  - command: source
    default: ask
    argPatterns:
      - match:
          anyArgMatches: ['^~/\.config/bash/plugins/development\.plugin\.bash$', '^/Users/bob/\.config/bash/plugins/development\.plugin\.bash$']
        decision: allow
        description: Allow sourcing the development bash plugin
  - command: development.plugin.bash
    default: allow
  # Git: allow most ops, ask for dangerous ones
  - command: git
    default: allow
    argPatterns:
      - match:
          argsMatch:
            [
              "push --force",
              "push -f ",
              "reset --hard",
              "clean -fd",
              "clean -f ",
            ]
        decision: ask
        description: Dangerous git operations
  # rm: allow simple removes, ask for recursive
  - command: rm
    default: allow
    argPatterns:
      - match:
          argsMatch: ["-r[f ].*/tmp/"]
        decision: allow
        description: Recursive delete under any tmp/ path segment (repo tmp/ dirs are ephemeral by the dev/local GC contract)
      - match:
          argsMatch: ["-rf ", "-rf$", "-r "]
        decision: ask
        description: Recursive delete
  # chmod: allow the safe exec-bit toggle (chmod +x / u+x / a+x), ask for
  # anything else (numeric modes, -R, world-writable). The +x form is what the
  # autopilot loop needs for its scripts; the dangerous forms stay gated.
  - command: chmod
    default: ask
    argPatterns:
      - match:
          anyArgMatches: ['^[ugoa]*\+x$']
        decision: allow
        description: Allow chmod +x (exec bit only)
  # bash: ask by default (could run anything), allow syntax check
  - command: bash
    default: ask
    argPatterns:
      - match:
          argsMatch: ["^-n "]
        decision: allow
        description: Syntax checking
  # kill/pkill: allow (native perms gate these)
  - command: kill
    default: allow
  - command: pkill
    default: allow
  # Docker/k8s: ask by default
  - command: docker
    default: ask
    argPatterns:
      - match:
          argsMatch: ["^ps", "^images", "^logs"]
        decision: allow
        description: Read-only docker commands
  - command: kubectl
    default: ask
    argPatterns:
      - match:
          anyArgMatches:
            [
              "^get$",
              "^describe$",
              "^logs$",
              "^top$",
              "^explain$",
              "^config$",
              "^version$",
              "^api-resources$",
              "^api-versions$",
              "^cluster-info$",
              "^kustomize$",
              "^wait$",
              "^diff$",
              "^auth$",
              "^rollout$",
            ]
        decision: allow
        description: Read-only kubectl commands
  - command: sqlite3
    default: allow
    argPatterns:
      - match:
          anyArgMatches:
            [
              "^DROP ",
              "^DELETE ",
              "^INSERT ",
              "^UPDATE ",
              "^ALTER ",
              "^CREATE ",
            ]
        decision: ask
        description: Destructive SQL operations
  - command: sudo
    default: deny
  - command: eval
    default: deny
  - command: uvx
    default: ask
    argPatterns:
      - match:
          anyArgMatches: ["^showboat$"]
        decision: allow
        description: Allow uvx showboat
      - match:
          anyArgMatches: ["^pytest$"]
        decision: allow
        description: Allow uvx pytest
  # render: the playground hardware layout renderer. Allow only when a target
  # path is under the playground hardware tree (the autopilot loop's circuit
  # PRDs); any other `render` invocation still asks.
  - command: render
    default: ask
    argPatterns:
      - match:
          anyArgMatches: ['tbouska/playground/hardware/']
        decision: allow
        description: Allow render on playground hardware layouts
