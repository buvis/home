# Warden config — complements native Claude permissions
# alwaysAllow bypasses all rule evaluation, so only list commands
# that are ALWAYS safe regardless of arguments.

defaultDecision: ask
auditAllowDecisions: true
askOnSubshell: true
notifyOnAsk: true
notifyOnDeny: true

alwaysDeny:
  - nc
  - ncat

alwaysAllow:
  # GitHub CLI
  - gh
  # Rust toolchain
  - cargo
  # Node/Python toolchains
  - node
  - python
  - python3
  - pip
  - npm
  - pnpm
  - npx
  - yarn
  - uv
  - ruff
  - mypy
  - pytest
  # Dev tools
  - showboat
  - zdb
  - ast-grep
  - mdbook
  - codex
  - copilot
  - claude
  - mise
  - curl
  # Safe shell utilities (read-only or harmless)
  - ls
  - pwd
  - cat
  - head
  - tail
  - echo
  - rg
  - grep
  - wc
  - sort
  - diff
  - tree
  - which
  - xxd
  - test
  - timeout
  - lsof
  - dig
  - ffmpeg
  - ffprobe
  - mkdocs
  - rmdir
  - shellcheck
  - rustc
  - gpgconf
  - ddb
  # File ops (safe enough, native perms gate destructive patterns)
  - cp
  - mv
  - mkdir
  - touch
  - sed
  - awk
  # Skill scripts — glob matches all scripts under ~/.claude/skills/
  - ~/.claude/skills/**
  # Hook scripts
  - ~/.claude/hooks/**
  # Project test scripts
  - smoke.sh

rules:
  # Git: allow most ops, ask for dangerous ones
  - command: git
    default: allow
    argPatterns:
      - match:
          argsMatch:
            [
              "push --force",
              "push -f ",
              "reset --hard",
              "clean -fd",
              "clean -f ",
            ]
        decision: ask
        description: Dangerous git operations
  # rm: allow simple removes, ask for recursive
  - command: rm
    default: allow
    argPatterns:
      - match:
          argsMatch: ["-r[f ].*/tmp/"]
        decision: allow
        description: Recursive delete in /tmp
      - match:
          argsMatch: ["-rf ", "-rf$", "-r "]
        decision: ask
        description: Recursive delete
  # bash: ask by default (could run anything), allow syntax check
  - command: bash
    default: ask
    argPatterns:
      - match:
          argsMatch: ["^-n "]
        decision: allow
        description: Syntax checking
  # kill/pkill: allow (native perms gate these)
  - command: kill
    default: allow
  - command: pkill
    default: allow
  # Docker/k8s: ask by default
  - command: docker
    default: ask
    argPatterns:
      - match:
          argsMatch: ["^ps", "^images", "^logs"]
        decision: allow
        description: Read-only docker commands
  - command: kubectl
    default: ask
    argPatterns:
      - match:
          anyArgMatches: ["^kustomize$", "^rollout$"]
        decision: allow
        description: Read-only kubectl commands
  - command: sqlite3
    default: allow
    argPatterns:
      - match:
          anyArgMatches:
            [
              "^DROP ",
              "^DELETE ",
              "^INSERT ",
              "^UPDATE ",
              "^ALTER ",
              "^CREATE ",
            ]
        decision: ask
        description: Destructive SQL operations
  - command: sudo
    default: deny
  - command: eval
    default: deny
  - command: uvx
    default: ask
    argPatterns:
      - match:
          anyArgMatches: ["^showboat$"]
        decision: allow
        description: Allow uvx showboat
