[pytest]
# Register the custom marks used in this dir so pytest stops warning on every
# run (PRD 00085 R6). --strict-markers turns a typo'd/unregistered mark into an
# error instead of a silent warning — safe here: the only marks in use are the
# built-in `parametrize` plus these two.
markers =
    unit: fast, isolated unit test
    integration: subprocess/filesystem integration test (real git repos, run.py child process)
addopts = --strict-markers
